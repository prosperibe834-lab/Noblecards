name: noble_cards
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  boxicons: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets directory
  assets:
    - lib/assets/logos/
    - lib/assets/logos/
    - lib/assets/onboarding/

  # Custom Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/Poppins-Regular.ttf
        - asset: lib/assets/fonts/Poppins-Bold.ttf

    - family: Inter
      fonts:
        - asset: lib/assets/fonts/Inter-Regular.ttf
        - asset: lib/assets/fonts/Inter-Medium.ttf

    - family: SpaceGrotesk
      fonts:
        - asset: lib/assets/fonts/SpaceGrotesk-Bold.ttf